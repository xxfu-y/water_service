syntax = "proto3";

package water;
option java_multiple_files = false;
option java_package = "com.water";
option java_outer_classname = "WaterOuterClass";

// 单条传感器数据
message WaterSensorData {
    int64 id = 1;
    string timestamp = 2;

    double inflow_rate2 = 3;
    double inflow_cod = 4;
    double inflow_nh3 = 5;

    double outflow_cod = 6;
    double outflow_nh3 = 7;

    double bio2_front_aeration_flow_meas = 8;
    double bio2_front_valve_opening_meas = 9;
    double bio2_end_aeration_flow_meas = 10;
    double bio2_end_valve_opening_meas = 11;

    double bio2_front_do_meas = 12;
    double bio2_end_do_meas = 13;
    double bio2_mlss_meas = 14;
    double bio2_aeration_pipe_pressure_meas = 15;

    double bio2_1_blower_opening_meas = 16;
    int32  bio2_1_blower_is_running = 17;
    double bio2_1_blower_pressure_meas = 18;

    double bio2_2_blower_opening_meas = 19;
    int32  bio2_2_blower_is_running = 20;
    double bio2_2_blower_pressure_meas = 21;
}

// 训练请求
message TrainRequest {
    int32 train_steps = 1;        // 训练步长
    int32 predict_steps = 2;      // 预测步长
    string model_type = 3;        // 模型类型 LSTM/CatBoost
    string model_name = 4;        // 模型名称
    repeated string data_tags = 5;     // 数据标签列表
    string target_variable = 6;        // 目标变量
    string start_time = 7;             // 开始时间 (yyyy-MM-dd HH:mm:ss)
    string end_time = 8;               // 结束时间 (yyyy-MM-dd HH:mm:ss)
    int32 sampling_interval = 9;       // 采样间隔(秒)
}

// 训练响应
message TrainResponse {
    bool success = 1;
    string message = 2;
    string model_name = 3;
    string model_path = 4;
    string scaler_path = 5;
    string config_path = 6;
    map<string, ModelMetrics> metrics = 7;
}

// 模型评估指标
message ModelMetrics {
    double rmse = 1;
    double mae = 2;
    double r2 = 3;
}
// 训练服务
service WaterTrainService {
    rpc Train(TrainRequest) returns (TrainResponse);
}

// 模型文件下载请求
message ModelDownloadRequest {
    string task_no = 1;
    string task_name = 2;
    string model_json = 3;  // 模型的完整JSON信息
}

// 模型文件下载响应
message ModelDownloadResponse {
    bool success = 1;
    string message = 2;
    bytes file_content = 3;
    string file_name = 4;
    string model_type = 5;
    string model_version = 6;
    double r2 = 7;
    double mae = 8;
    double rmse = 9;
}

// 模型文件上传请求
message ModelUploadRequest {
    string task_no = 1;
    string task_name = 2;
    bytes file_content = 3;
    string file_name = 4;
    string model_type = 5;
    string model_version = 6;
    double r2 = 7;
    double mae = 8;
    double rmse = 9;
    string model_name = 10;
}

// 模型文件上传响应
message ModelUploadResponse {
    bool success = 1;
    string message = 2;
    string model_path = 3;
}

// 模型管理服务
service WaterModelService {
    rpc DownloadModel(ModelDownloadRequest) returns (ModelDownloadResponse);
    rpc UploadModel(ModelUploadRequest) returns (ModelUploadResponse);
}

// 实例监控数据请求
message InstanceMonitorRequest {
    repeated int64 instance_ids = 1;  // 实例ID列表
}

// 实例监控数据响应
message InstanceMonitorData {
    int64 instance_id = 1;            // 实例ID
    string instance_name = 2;         // 实例名称
    string health_level = 3;          // 健康度等级（GOOD/NORMAL/POOR/NONE）
    double rmse = 4;                  // RMSE评估指标
    double predicted_value = 5;       // 预测值
    string predict_time = 6;          // 预测时间（ISO 8601格式）
    double mv_value = 7;              // 计算值MV
    double cv_value = 8;              // 目标值CV
}

// 实例监控流式响应
message InstanceMonitorStreamResponse {
    bool success = 1;
    string message = 2;
    repeated InstanceMonitorData data_list = 3;  // 多个实例的监控数据
    int64 timestamp = 4;              // 服务端时间戳
}

// 实例监控服务
service WaterInstanceMonitorService {
    // 流式推送实例监控数据
    rpc MonitorInstances(InstanceMonitorRequest) returns (stream InstanceMonitorStreamResponse);
}